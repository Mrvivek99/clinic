<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Clinic — Doctor Settings</title>
  <link rel="stylesheet" href="assets/css/global.css">
  <style>
    .settings-grid {
      display: grid; grid-template-columns: 1fr 2fr; gap: 2rem;
    }
    .profile-card {
      background: var(--white); border-radius: var(--radius-lg); padding: 2rem;
      box-shadow: var(--shadow); text-align: center;
    }
    .profile-avatar {
      width: 120px; height: 120px; border-radius: 50%; background: var(--teal-xl);
      color: var(--teal); font-size: 3rem; display: inline-flex;
      align-items: center; justify-content: center; margin-bottom: 1.5rem;
      border: 4px solid var(--white); box-shadow: 0 4px 12px rgba(0,0,0,.1);
    }
    .section-title {
      font-size: 1.1rem; font-weight: 700; color: var(--navy);
      margin-bottom: 1.25rem; display: flex; align-items: center; gap: .5rem;
    }
    .form-section {
      background: var(--white); border-radius: var(--radius-lg); padding: 2rem;
      box-shadow: var(--shadow); margin-bottom: 2rem;
    }
    .days-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: .5rem;
    }
    .day-checkbox {
      display: flex; align-items: center; gap: .5rem; font-size: .85rem;
      padding: .6rem; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      cursor: pointer; transition: all var(--transition);
    }
    .day-checkbox input { display: none; }
    .day-checkbox.selected { border-color: var(--teal); background: var(--teal-xl); color: var(--teal); }
  </style>
</head>
<body>
  <nav class="navbar">
    <a class="navbar-brand" href="/doctor-dashboard.html"><div class="brand-icon">🏥</div> Smart Clinic</a>
    <ul class="navbar-nav">
      <li><a href="/doctor-dashboard.html">My Queue</a></li>
      <li><a href="/doctor-settings.html" class="active">Settings</a></li>
      <li><a href="/profile.html">My Profile</a></li>
    </ul>
    <div class="navbar-user">
      <div class="avatar" id="user-avatar">D</div>
      <span id="user-name">Doctor</span>
      <button class="btn btn-ghost btn-sm" onclick="Auth.logout()">Sign Out</button>
    </div>
  </nav>

  <div class="page-wrapper">
    <div class="page-header">
      <h1 class="page-title">Profile Settings</h1>
      <p class="page-subtitle">Manage your professional information and availability</p>
    </div>

    <div class="settings-grid">
      <!-- Left: Profile Summary -->
      <aside>
        <div class="profile-card">
          <div class="profile-avatar" id="doc-p-avatar">D</div>
          <h2 id="doc-p-name">Dr. Name</h2>
          <p id="doc-p-title" style="color:var(--text-3);font-size:.9rem;margin-bottom:1.5rem">Specialization</p>
          <div style="text-align:left;padding-top:1.5rem;border-top:1px solid var(--border)">
            <div style="margin-bottom:1rem">
              <label class="stat-label">Consultation Fee</label>
              <div style="font-weight:700;font-size:1.2rem;color:var(--teal)" id="doc-p-fee">₹0</div>
            </div>
            <div>
              <label class="stat-label">Next Slot Duration</label>
              <div style="font-weight:600" id="doc-p-dur">15 min</div>
            </div>
          </div>
        </div>
      </aside>

      <!-- Right: Settings Form -->
      <main>
        <form id="profile-form">
          <div class="form-section">
            <h3 class="section-title">🩺 Professional Details</h3>
            <div class="form-row">
              <div class="form-group">
                <label>Specialization</label>
                <input type="text" id="specialization" placeholder="e.g. Cardiologist" required>
              </div>
              <div class="form-group">
                <label>Qualification</label>
                <input type="text" id="qualification" placeholder="e.g. MBBS, MD" required>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Experience (Years)</label>
                <input type="number" id="experience" min="0" value="0">
              </div>
              <div class="form-group">
                <label>Consultation Fee (₹)</label>
                <input type="number" id="consultationFee" min="0" value="0">
              </div>
            </div>
            <div class="form-group">
              <label>Doctor's Bio</label>
              <textarea id="bio" rows="4" placeholder="Tell patients about yourself…"></textarea>
            </div>
          </div>

          <div class="form-section">
            <h3 class="section-title">⏱ Availability & Hours</h3>
            <div class="form-group">
              <label>Working Days</label>
              <div class="days-grid" id="days-container">
                <!-- Days will be inserted -->
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Start Time</label>
                <input type="time" id="work-start" value="09:00">
              </div>
              <div class="form-group">
                <label>End Time</label>
                <input type="time" id="work-end" value="17:00">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Break Start</label>
                <input type="time" id="break-start" value="13:00">
              </div>
              <div class="form-group">
                <label>Break End</label>
                <input type="time" id="break-end" value="14:00">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Slot Duration (min)</label>
                <input type="number" id="slotDuration" min="5" max="60" value="15">
              </div>
              <div class="form-group">
                <label>Max Patients/Day</label>
                <input type="number" id="maxPatients" min="1" value="30">
              </div>
            </div>
          </div>

          <div style="display:flex;justify-content:flex-end;gap:1rem">
            <button type="button" class="btn btn-secondary" onclick="window.location.reload()">Reset</button>
            <button type="submit" class="btn btn-primary" id="save-btn">💾 Save Changes</button>
          </div>
        </form>
      </main>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="assets/js/api.js"></script>
  <script>
    if (!requireAuth()) throw '';
    const user = Auth.getUser();
    // Doctor/admin-only guard
    if (user?.role !== 'doctor' && user?.role !== 'admin') {
      showToast('Access denied. Doctors only.', 'error');
      setTimeout(() => window.location.href = '/dashboard.html', 1500);
      throw '';
    }
    document.getElementById('user-name').textContent = user?.name || 'Doctor';
    document.getElementById('doc-p-name').textContent = 'Dr. ' + (user?.name || 'Doctor');
    document.getElementById('user-avatar').textContent = (user?.name || 'D')[0].toUpperCase();
    document.getElementById('doc-p-avatar').textContent = (user?.name || 'D')[0].toUpperCase();

    const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
    const daysContainer = document.getElementById('days-container');
    daysContainer.innerHTML = days.map(d => `
      <label class="day-checkbox">
        <input type="checkbox" name="workingDays" value="${d}">
        <span>${d}</span>
      </label>
    `).join('');

    // Toggle selected class
    daysContainer.querySelectorAll('input').forEach(chk => {
      chk.addEventListener('change', () => chk.parentElement.classList.toggle('selected', chk.checked));
    });

    async function loadProfile() {
      try {
        const data = await API.get('/doctors/me');
        if (data && data.doctor) {
          const d = data.doctor;
          document.getElementById('specialization').value = d.specialization || '';
          document.getElementById('qualification').value = d.qualification || '';
          document.getElementById('experience').value = d.experience || 0;
          document.getElementById('consultationFee').value = d.consultationFee || 0;
          document.getElementById('bio').value = d.bio || '';
          document.getElementById('slotDuration').value = d.slotDuration || 15;
          document.getElementById('maxPatients').value = d.maxPatientsPerDay || 30;
          document.getElementById('work-start').value = d.workingHours?.start || '09:00';
          document.getElementById('work-end').value = d.workingHours?.end || '17:00';
          document.getElementById('break-start').value = d.breakTime?.start || '13:00';
          document.getElementById('break-end').value = d.breakTime?.end || '14:00';

          // Side card updates
          document.getElementById('doc-p-title').textContent = d.specialization || 'Professional';
          document.getElementById('doc-p-fee').textContent = '₹' + (d.consultationFee || 0);
          document.getElementById('doc-p-dur').textContent = (d.slotDuration || 15) + ' min';

          // Days
          const dList = d.workingDays || [];
          document.querySelectorAll('input[name="workingDays"]').forEach(chk => {
            if (dList.includes(chk.value)) {
              chk.checked = true;
              chk.parentElement.classList.add('selected');
            }
          });
        }
      } catch (err) {
        if (err.status !== 404) showToast('Failed to load doctor profile.', 'error');
        else showToast('Please complete your profile to start receiving appointments.', 'info');
      }
    }

    document.getElementById('profile-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('save-btn');
      btn.disabled = true;
      btn.textContent = 'Saving…';

      const workingDays = Array.from(document.querySelectorAll('input[name="workingDays"]:checked')).map(c => c.value);
      
      const payload = {
        specialization: document.getElementById('specialization').value,
        qualification: document.getElementById('qualification').value,
        experience: parseInt(document.getElementById('experience').value),
        consultationFee: parseInt(document.getElementById('consultationFee').value),
        bio: document.getElementById('bio').value,
        slotDuration: parseInt(document.getElementById('slotDuration').value),
        maxPatientsPerDay: parseInt(document.getElementById('maxPatients').value),
        workingDays,
        workingHours: {
          start: document.getElementById('work-start').value,
          end: document.getElementById('work-end').value
        },
        breakTime: {
          start: document.getElementById('break-start').value,
          end: document.getElementById('break-end').value
        }
      };

      try {
        await API.post('/doctors/me', payload);
        showToast('Profile updated successfully!', 'success');
        setTimeout(() => window.location.reload(), 1000);
      } catch (err) {
        showToast(err.error || 'Failed to save profile.', 'error');
        btn.disabled = false;
        btn.textContent = '💾 Save Changes';
      }
    });

    loadProfile();
  </script>
</body>
</html>
